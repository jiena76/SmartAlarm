name: smart_alarm
description: "Calendar-aware alarm that won't dismiss until you leave home."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Location & Geofencing
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  # Local notifications & alarms
  flutter_local_notifications: ^21.0.0
  alarm: ^5.0.0

  # Calendar
  device_calendar: ^4.3.3

  # Timezone
  timezone: ^0.11.0

  # Local storage
  shared_preferences: ^2.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Subscriptions
  purchases_flutter: ^8.3.0

  # Permissions
  permission_handler: ^11.3.1

dependency_overrides:
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
